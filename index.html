<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Cek Kesehatan Darah</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        background: #f0f4f8;
        overflow: hidden;
      }

      /* ===== LOGIN SCREEN ===== */
      .login-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #042c53 0%, #0c447c 100%);
        z-index: 100;
        padding: 20px;
      }
      .login-card {
        background: #fff;
        width: 100%;
        max-width: 360px;
        border-radius: 18px;
        padding: 32px 26px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }
      .login-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #042c53;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
      }
      .login-icon i {
        font-size: 26px;
        color: #fff;
      }
      .login-title {
        text-align: center;
        font-size: 17px;
        font-weight: 600;
        color: #1a2b3c;
        margin-bottom: 4px;
      }
      .login-sub {
        text-align: center;
        font-size: 12.5px;
        color: #94a3b8;
        margin-bottom: 22px;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: #475569;
        margin-bottom: 6px;
      }
      .field-input {
        position: relative;
      }
      .field-input i {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 16px;
      }
      .field-input input {
        width: 100%;
        padding: 11px 14px 11px 38px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
        background: #f8fafc;
      }
      .field-input input:focus {
        border-color: #0c447c;
        background: #fff;
      }
      .toggle-pass {
        cursor: pointer;
        pointer-events: all !important;
        right: 13px !important;
        left: auto !important;
      }
      .btn-login {
        width: 100%;
        padding: 12px;
        background: #042c53;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s;
      }
      .btn-login:hover {
        background: #0c447c;
      }
      .btn-login:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
      }
      .spinner.show {
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .login-msg {
        margin-top: 14px;
        font-size: 12.5px;
        text-align: center;
        color: #b91c1c;
        min-height: 16px;
      }
      .login-msg.ok {
        color: #15803d;
      }

      /* ===== APP LAYOUT ===== */
      .layout {
        display: none;
        flex-direction: column;
        height: 100vh;
      }
      .layout.show {
        display: flex;
      }

      .topbar {
        background: #fff;
        border-bottom: 0.5px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        flex-shrink: 0;
      }
      .topbar-user {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12.5px;
        color: #475569;
        font-weight: 500;
        position: relative;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 8px;
        transition: background 0.15s;
      }
      .topbar-user:hover {
        background: #f1f5f9;
      }
      .topbar-user i.ti-chevron-down {
        font-size: 13px;
        color: #94a3b8;
        margin-left: 1px;
        transition: transform 0.15s;
      }
      .topbar-user.open i.ti-chevron-down {
        transform: rotate(180deg);
      }
      .topbar-user i.ti-user-circle {
        font-size: 16px;
        color: #0c447c;
      }
      .user-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        min-width: 170px;
        padding: 6px;
        display: none;
        z-index: 30;
      }
      .user-dropdown.show {
        display: block;
      }
      .user-dropdown-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 10px;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 500;
        color: #334155;
        cursor: pointer;
        transition: background 0.15s;
      }
      .user-dropdown-item:hover {
        background: #f1f5f9;
      }
      .user-dropdown-item i {
        font-size: 15px;
        color: #64748b;
      }
      .user-dropdown-item.danger {
        color: #b91c1c;
      }
      .user-dropdown-item.danger i {
        color: #b91c1c;
      }

      /* ===== MODAL UBAH PASSWORD ===== */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 20px;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal-card {
        background: #fff;
        width: 100%;
        max-width: 340px;
        border-radius: 16px;
        padding: 24px 22px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .modal-title {
        font-size: 15px;
        font-weight: 600;
        color: #1a2b3c;
      }
      .modal-close {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #94a3b8;
        background: #f1f5f9;
        border: none;
      }
      .modal-close:hover {
        background: #e2e8f0;
      }
      .modal-msg {
        margin-top: 10px;
        font-size: 12.5px;
        text-align: center;
        color: #b91c1c;
        min-height: 16px;
      }
      .modal-msg.ok {
        color: #15803d;
      }

      .menutabs {
        background: #fff;
        border-bottom: 0.5px solid #e2e8f0;
        display: flex;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .menutabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 10px 18px;
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        white-space: nowrap;
        flex-shrink: 0;
        transition:
          border-color 0.15s,
          background 0.15s;
        user-select: none;
      }
      .tab:hover {
        background: #f8fafc;
      }
      .tab.active {
        border-bottom-color: #042c53;
      }

      .tab-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1f5f9;
        transition: background 0.15s;
      }
      .tab-icon i {
        font-size: 17px;
        color: #94a3b8;
        transition: color 0.15s;
      }

      .tab.active .tab-icon.blue {
        background: #e6f1fb;
      }
      .tab.active .tab-icon.blue i {
        color: #0c447c;
      }
      .tab.active .tab-icon.green {
        background: #eaf3de;
      }
      .tab.active .tab-icon.green i {
        color: #27500a;
      }
      .tab.active .tab-icon.amber {
        background: #faeeda;
      }
      .tab.active .tab-icon.amber i {
        color: #633806;
      }
      .tab.active .tab-icon.pink {
        background: #fbeaf0;
      }
      .tab.active .tab-icon.pink i {
        color: #72243e;
      }

      .tab-label {
        font-size: 10px;
        font-weight: 500;
        color: #94a3b8;
        transition: color 0.15s;
      }
      .tab.active .tab-label {
        color: #042c53;
      }

      .content {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #f0f4f8;
        transition: opacity 0.2s;
      }
      .splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: #042c53;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-icon i {
        font-size: 28px;
        color: #fff;
      }
      .splash p {
        font-size: 13px;
        color: #6b7a8d;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
      }
      iframe.active {
        display: block;
      }

      .loadbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2.5px;
        background: #e6f1fb;
        display: none;
        z-index: 5;
      }
      .loadbar.show {
        display: block;
      }
      .loadbar-fill {
        height: 100%;
        width: 0;
        background: #042c53;
        animation: loading 1.4s ease-in-out infinite;
      }
      @keyframes loading {
        0% {
          width: 0;
          margin-left: 0;
        }
        50% {
          width: 70%;
          margin-left: 15%;
        }
        100% {
          width: 0;
          margin-left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-wrap" id="loginWrap">
      <div class="login-card">
        <div class="login-icon">
          <i class="ti ti-droplet" aria-hidden="true"></i>
        </div>
        <div class="login-title">Cek Kesehatan Darah</div>
        <div class="login-sub">Masuk untuk melanjutkan</div>

        <form id="loginForm" autocomplete="off">
          <div class="field">
            <label for="userid">UserID</label>
            <div class="field-input">
              <i class="ti ti-user" aria-hidden="true"></i>
              <input type="text" id="userid" placeholder="Masukkan UserID" required />
            </div>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="field-input">
              <i class="ti ti-lock" aria-hidden="true"></i>
              <input type="password" id="password" placeholder="Masukkan Password" required />
              <i class="ti ti-eye toggle-pass" id="togglePass" aria-hidden="true"></i>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="spinner" id="loginSpinner"></span>
            <span id="btnLoginText">Masuk</span>
          </button>

          <div class="login-msg" id="loginMsg"></div>
        </form>
      </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="layout" id="layout">
      <div class="topbar">
        <div class="topbar-user" id="userMenuToggle">
          <i class="ti ti-user-circle" aria-hidden="true"></i>
          <span id="userLabel">-</span>
          <i class="ti ti-chevron-down" aria-hidden="true"></i>

          <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown-item" id="openChangePass">
              <i class="ti ti-key" aria-hidden="true"></i>
              Ubah Password
            </div>
            <div class="user-dropdown-item danger" id="btnLogout">
              <i class="ti ti-logout" aria-hidden="true"></i>
              Keluar
            </div>
          </div>
        </div>
      </div>

      <div class="menutabs" role="tablist">
        <div class="tab" role="tab" onclick="buka('pendaftaran')" id="tab-pendaftaran">
          <div class="tab-icon blue">
            <i class="ti ti-clipboard-list" aria-hidden="true"></i>
          </div>
          <span class="tab-label">Pendaftaran</span>
        </div>
        <div class="tab" role="tab" onclick="buka('registrasi')" id="tab-registrasi">
          <div class="tab-icon green">
            <i class="ti ti-scan" aria-hidden="true"></i>
          </div>
          <span class="tab-label">Registrasi</span>
        </div>
        <div class="tab" role="tab" onclick="buka('antrian')" id="tab-antrian">
          <div class="tab-icon amber">
            <i class="ti ti-list-numbers" aria-hidden="true"></i>
          </div>
          <span class="tab-label">Antrian</span>
        </div>
        <div class="tab" role="tab" onclick="buka('list')" id="tab-list">
          <div class="tab-icon pink">
            <i class="ti ti-table" aria-hidden="true"></i>
          </div>
          <span class="tab-label">List Peserta</span>
        </div>
      </div>

      <div class="content">
        <div class="loadbar" id="loadbar"><div class="loadbar-fill"></div></div>

        <div class="splash" id="splash">
          <div class="splash-icon">
            <i class="ti ti-hand-click" aria-hidden="true"></i>
          </div>
          <p>Pilih menu di atas untuk memulai</p>
        </div>

        <iframe id="frame-pendaftaran" src="" title="Pendaftaran"></iframe>
        <iframe id="frame-registrasi" src="" title="Registrasi & Verifikasi"></iframe>
        <iframe id="frame-antrian" src="" title="Antrian"></iframe>
        <iframe id="frame-list" src="" title="List Peserta"></iframe>
      </div>
    </div>

    <!-- ===== MODAL UBAH PASSWORD ===== -->
    <div class="modal-overlay" id="changePassOverlay">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-title">Ubah Password</div>
          <button class="modal-close" id="closeChangePass">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>

        <form id="changePassForm" autocomplete="off">
          <div class="field">
            <label for="oldPassword">Password Lama</label>
            <div class="field-input">
              <i class="ti ti-lock" aria-hidden="true"></i>
              <input type="password" id="oldPassword" placeholder="Password saat ini" required />
            </div>
          </div>
          <div class="field">
            <label for="newPassword">Password Baru</label>
            <div class="field-input">
              <i class="ti ti-lock-open" aria-hidden="true"></i>
              <input type="password" id="newPassword" placeholder="Minimal 4 karakter" required />
            </div>
          </div>
          <div class="field">
            <label for="confirmPassword">Konfirmasi Password Baru</label>
            <div class="field-input">
              <i class="ti ti-lock-open" aria-hidden="true"></i>
              <input type="password" id="confirmPassword" placeholder="Ulangi password baru" required />
            </div>
          </div>

          <button type="submit" class="btn-login" id="btnChangePass">
            <span class="spinner" id="changePassSpinner"></span>
            <span id="btnChangePassText">Simpan</span>
          </button>

          <div class="modal-msg" id="changePassMsg"></div>
        </form>
      </div>
    </div>

    <script>
      // ===================================================
      // GANTI dengan URL deployment Apps Script kamu
      // ===================================================
      const API_URL = "https://script.google.com/macros/s/AKfycbwEL79X_HWU9gWMZN6O_WqaYmd0FrwJnD5PbYNKMtc10uWv5raPSNv20kCqQBayfET0HQ/exec";

      const URLS = {
        pendaftaran: "https://hyegun.github.io/form-daftar/",
        registrasi: "https://hyegun.github.io/scaner/",
        antrian: "https://hyegun.github.io/antrian/",
        list: "https://hyegun.github.io/list/",
      };

      let current = null;

      // ---------- LOGIN ----------
      const loginWrap = document.getElementById("loginWrap");
      const layout = document.getElementById("layout");
      const loginForm = document.getElementById("loginForm");
      const loginMsg = document.getElementById("loginMsg");
      const btnLogin = document.getElementById("btnLogin");
      const loginSpinner = document.getElementById("loginSpinner");
      const btnLoginText = document.getElementById("btnLoginText");
      const togglePass = document.getElementById("togglePass");
      const passInput = document.getElementById("password");

      togglePass.addEventListener("click", () => {
        const isPass = passInput.type === "password";
        passInput.type = isPass ? "text" : "password";
        togglePass.className = isPass
          ? "ti ti-eye-off toggle-pass"
          : "ti ti-eye toggle-pass";
      });

      function setLoading(loading) {
        btnLogin.disabled = loading;
        loginSpinner.classList.toggle("show", loading);
        btnLoginText.textContent = loading ? "Memeriksa..." : "Masuk";
      }

      function showMsg(text, ok) {
        loginMsg.textContent = text;
        loginMsg.className = "login-msg" + (ok ? " ok" : "");
      }

      function showApp(userid) {
        loginWrap.style.display = "none";
        layout.classList.add("show");
        document.getElementById("userLabel").textContent = userid;
      }

      // Cek sesi yang sudah tersimpan
      window.addEventListener("DOMContentLoaded", () => {
        const saved = sessionStorage.getItem("ckd_userid");
        if (saved) showApp(saved);
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const userid = document.getElementById("userid").value.trim();
        const password = passInput.value.trim();

        if (!userid || !password) {
          showMsg("UserID dan Password wajib diisi", false);
          return;
        }

        setLoading(true);
        showMsg("", false);

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", userid, password }),
          });
          const data = await res.json();

          if (data.success) {
            showMsg("Login berhasil", true);
            sessionStorage.setItem("ckd_userid", data.userid);
            setTimeout(() => showApp(data.userid), 400);
          } else {
            showMsg(data.message || "UserID atau Password salah", false);
          }
        } catch (err) {
          showMsg("Gagal terhubung ke server. Coba lagi.", false);
        } finally {
          setLoading(false);
        }
      });

      document.getElementById("btnLogout").addEventListener("click", () => {
        sessionStorage.removeItem("ckd_userid");
        layout.classList.remove("show");
        loginWrap.style.display = "flex";
        loginForm.reset();
        showMsg("", false);
        closeUserDropdown();
      });

      // ---------- DROPDOWN USER ----------
      const userMenuToggle = document.getElementById("userMenuToggle");
      const userDropdown = document.getElementById("userDropdown");

      function closeUserDropdown() {
        userDropdown.classList.remove("show");
        userMenuToggle.classList.remove("open");
      }

      userMenuToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        userDropdown.classList.toggle("show");
        userMenuToggle.classList.toggle("open");
      });

      document.addEventListener("click", (e) => {
        if (!userMenuToggle.contains(e.target)) closeUserDropdown();
      });

      // ---------- MODAL UBAH PASSWORD ----------
      const changePassOverlay = document.getElementById("changePassOverlay");
      const changePassForm = document.getElementById("changePassForm");
      const changePassMsg = document.getElementById("changePassMsg");
      const btnChangePass = document.getElementById("btnChangePass");
      const changePassSpinner = document.getElementById("changePassSpinner");
      const btnChangePassText = document.getElementById("btnChangePassText");

      document.getElementById("openChangePass").addEventListener("click", () => {
        closeUserDropdown();
        changePassForm.reset();
        changePassMsg.textContent = "";
        changePassMsg.className = "modal-msg";
        changePassOverlay.classList.add("show");
      });

      function closeChangePassModal() {
        changePassOverlay.classList.remove("show");
      }

      document.getElementById("closeChangePass").addEventListener("click", closeChangePassModal);
      changePassOverlay.addEventListener("click", (e) => {
        if (e.target === changePassOverlay) closeChangePassModal();
      });

      function setChangePassLoading(loading) {
        btnChangePass.disabled = loading;
        changePassSpinner.classList.toggle("show", loading);
        btnChangePassText.textContent = loading ? "Menyimpan..." : "Simpan";
      }

      function showChangePassMsg(text, ok) {
        changePassMsg.textContent = text;
        changePassMsg.className = "modal-msg" + (ok ? " ok" : "");
      }

      changePassForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const userid = sessionStorage.getItem("ckd_userid");
        const oldPassword = document.getElementById("oldPassword").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const confirmPassword = document.getElementById("confirmPassword").value.trim();

        if (!oldPassword || !newPassword || !confirmPassword) {
          showChangePassMsg("Semua field wajib diisi", false);
          return;
        }
        if (newPassword.length < 4) {
          showChangePassMsg("Password baru minimal 4 karakter", false);
          return;
        }
        if (newPassword !== confirmPassword) {
          showChangePassMsg("Konfirmasi password tidak cocok", false);
          return;
        }

        setChangePassLoading(true);
        showChangePassMsg("", false);

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "changePassword",
              userid,
              oldPassword,
              newPassword,
            }),
          });
          const data = await res.json();

          if (data.success) {
            showChangePassMsg("Password berhasil diubah", true);
            setTimeout(() => closeChangePassModal(), 1000);
          } else {
            showChangePassMsg(data.message || "Gagal mengubah password", false);
          }
        } catch (err) {
          showChangePassMsg("Gagal terhubung ke server. Coba lagi.", false);
        } finally {
          setChangePassLoading(false);
        }
      });

      // ---------- MENU TAB SWITCHING ----------
      function buka(key) {
        if (current === key) return;

        document.getElementById("splash").classList.add("hidden");

        if (current) {
          document.getElementById("tab-" + current).classList.remove("active");
          document.getElementById("frame-" + current).classList.remove("active");
        }

        document.getElementById("tab-" + key).classList.add("active");

        const lb = document.getElementById("loadbar");
        lb.classList.add("show");

        const frame = document.getElementById("frame-" + key);
        if (!frame.getAttribute("data-loaded")) {
          frame.src = URLS[key];
          frame.setAttribute("data-loaded", "1");
          frame.onload = () => lb.classList.remove("show");
        } else {
          setTimeout(() => lb.classList.remove("show"), 200);
        }

        frame.classList.add("active");
        current = key;
      }
    </script>
  </body>
</html>
