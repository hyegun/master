<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Menu Utama — Cek Kesehatan Darah</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        background: #f0f4f8;
        overflow: hidden;
      }

      .layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .menutabs {
        background: #fff;
        border-bottom: 0.5px solid #e2e8f0;
        display: flex;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .menutabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 10px 18px;
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        white-space: nowrap;
        flex-shrink: 0;
        transition:
          border-color 0.15s,
          background 0.15s;
        user-select: none;
      }
      .tab:hover {
        background: #f8fafc;
      }
      .tab.active {
        border-bottom-color: #042c53;
      }

      .tab-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1f5f9;
        transition: background 0.15s;
      }
      .tab-icon i {
        font-size: 17px;
        color: #94a3b8;
        transition: color 0.15s;
      }

      .tab.active .tab-icon.blue {
        background: #e6f1fb;
      }
      .tab.active .tab-icon.blue i {
        color: #0c447c;
      }
      .tab.active .tab-icon.green {
        background: #eaf3de;
      }
      .tab.active .tab-icon.green i {
        color: #27500a;
      }
      .tab.active .tab-icon.amber {
        background: #faeeda;
      }
      .tab.active .tab-icon.amber i {
        color: #633806;
      }
      .tab.active .tab-icon.pink {
        background: #fbeaf0;
      }
      .tab.active .tab-icon.pink i {
        color: #72243e;
      }

      .tab-label {
        font-size: 10px;
        font-weight: 500;
        color: #94a3b8;
        transition: color 0.15s;
      }
      .tab.active .tab-label {
        color: #042c53;
      }

      .content {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #f0f4f8;
        transition: opacity 0.2s;
      }
      .splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: #042c53;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-icon i {
        font-size: 28px;
        color: #fff;
      }
      .splash p {
        font-size: 13px;
        color: #6b7a8d;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
      }
      iframe.active {
        display: block;
      }

      .loadbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2.5px;
        background: #e6f1fb;
        display: none;
        z-index: 5;
      }
      .loadbar.show {
        display: block;
      }
      .loadbar-fill {
        height: 100%;
        width: 0;
        background: #042c53;
        animation: loading 1.4s ease-in-out infinite;
      }
      @keyframes loading {
        0% {
          width: 0;
          margin-left: 0;
        }
        50% {
          width: 70%;
          margin-left: 15%;
        }
        100% {
          width: 0;
          margin-left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="menutabs" role="tablist">
        <div
          class="tab"
          role="tab"
          onclick="buka('pendaftaran')"
          id="tab-pendaftaran"
        >
          <div class="tab-icon blue">
            <i class="ti ti-clipboard-list" aria-hidden="true"></i>
          </div>
          <span class="tab-label">Pendaftaran</span>
        </div>
        <div
          class="tab"
          role="tab"
          onclick="buka('registrasi')"
          id="tab-registrasi"
        >
          <div class="tab-icon green">
            <i class="ti ti-scan" aria-hidden="true"></i>
          </div>
          <span class="tab-label">Registrasi</span>
        </div>
        <div class="tab" role="tab" onclick="buka('antrian')" id="tab-antrian">
          <div class="tab-icon amber">
            <i class="ti ti-list-numbers" aria-hidden="true"></i>
          </div>
          <span class="tab-label">Antrian</span>
        </div>
        <div class="tab" role="tab" onclick="buka('list')" id="tab-list">
          <div class="tab-icon pink">
            <i class="ti ti-table" aria-hidden="true"></i>
          </div>
          <span class="tab-label">List Peserta</span>
        </div>
      </div>

      <div class="content">
        <div class="loadbar" id="loadbar"><div class="loadbar-fill"></div></div>

        <div class="splash" id="splash">
          <div class="splash-icon">
            <i class="ti ti-hand-click" aria-hidden="true"></i>
          </div>
          <p>Pilih menu di atas untuk memulai</p>
        </div>

        <iframe id="frame-pendaftaran" src="" title="Pendaftaran"></iframe>
        <iframe
          id="frame-registrasi"
          src=""
          title="Registrasi & Verifikasi"
        ></iframe>
        <iframe id="frame-antrian" src="" title="Antrian"></iframe>
        <iframe id="frame-list" src="" title="List Peserta"></iframe>
      </div>
    </div>

    <script>
      const URLS = {
        pendaftaran: "https://hyegun.github.io/form-daftar/",
        registrasi: "https://hyegun.github.io/scaner/",
        antrian: "https://hyegun.github.io/antrian/",
        list: "https://hyegun.github.io/list/",
      };

      let current = null;

      function buka(key) {
        if (current === key) return;

        document.getElementById("splash").classList.add("hidden");

        if (current) {
          document.getElementById("tab-" + current).classList.remove("active");
          document
            .getElementById("frame-" + current)
            .classList.remove("active");
        }

        document.getElementById("tab-" + key).classList.add("active");

        const lb = document.getElementById("loadbar");
        lb.classList.add("show");

        const frame = document.getElementById("frame-" + key);
        if (!frame.getAttribute("data-loaded")) {
          frame.src = URLS[key];
          frame.setAttribute("data-loaded", "1");
          frame.onload = () => lb.classList.remove("show");
        } else {
          setTimeout(() => lb.classList.remove("show"), 200);
        }

        frame.classList.add("active");
        current = key;
      }
    </script>
  </body>
</html>
